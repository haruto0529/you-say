<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>QUIZE - 問題</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/index.css}">
	<link rel="stylesheet" th:href="@{/css/top.css}">
	<link rel="stylesheet" th:href="@{/css/quize.css}">

</head>

<body class="quiz-page-container">

	<header th:replace="~{fragments/header :: header}"></header>

	<main class="quiz-main">
		<div class="card quiz-display-card">
			<p class="quiz-question-text" th:text="${question.questionText}">
				ここにクイズの文章が表示されます
			</p>
		</div>
		<form class="quiz-answer-form" th:action="@{/quize/check}" method="post">
			<input type="hidden" name="questionId" th:value="${question.questionId}" />


			<input type="text" class="quiz-input-field" name="userAnswer"
				placeholder="ひらがなで回答してください" required autocomplete="off"
				pattern="[ぁ-んー]+"
				title="ひらがなで入力してください">

			<button type="submit" class="btn btn-orange">決定</button>
		</form>
	</main>

	<footer th:replace="~{fragments/footer :: footer}"></footer>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const savedDark = localStorage.getItem('quiz_dark_mode');
			if (savedDark === 'true') {
				document.body.classList.add('dark-mode');
			}
		});
	</script>
</body>

</html>
