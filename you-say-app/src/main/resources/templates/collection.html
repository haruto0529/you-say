<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Word Collection - You Say Quiz</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');

		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		:root {
			--color-green: #4caf50;
			--color-red: #e8453c;
			--color-orange: #f5a623;
			--color-blue: #4285f4;
			--font-display: 'Nunito', sans-serif;
			--font-body: 'Noto Sans JP', sans-serif;
			--radius-card: 16px;
			--shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.10);
			--shadow-md: 0 4px 20px rgba(0, 0, 0, 0.14);

			--bg-gradient-start: #f0f4f8;
			--bg-gradient-end: #d7e1ec;
			--card-bg: #ffffff;
			--card-border: #ffea9f;
			--card-outline: #a3751a;
			--card-shadow: #704e0a;
			--card-inner: rgba(255, 255, 255, 0.5);
			--text-main: #222222;
			--text-sub: #555555;
			--badge-bg: #f5f5f5;
			--badge-border: #dddddd;
			--like-btn-bg: #ffffff;
			--like-btn-border: #dddddd;
			--like-btn-shadow: #cccccc;
			--like-btn-color: #5a5a72;
			--sort-bg: #ffffff;
			--sort-border: #cccccc;
			--sort-color: #333333;
		}

		:root.dark-mode {
			--bg-gradient-start: #1a1f2e;
			--bg-gradient-end: #0d1117;
			--card-bg: #1e2436;
			--card-border: #c8a84b;
			--card-outline: #7a5a1a;
			--card-shadow: #0a0c12;
			--card-inner: rgba(255, 255, 255, 0.05);
			--text-main: #e8e8f0;
			--text-sub: #a0a8b8;
			--badge-bg: #2a3048;
			--badge-border: #3a4060;
			--like-btn-bg: #252b3d;
			--like-btn-border: #3a4060;
			--like-btn-shadow: #0a0c12;
			--like-btn-color: #a0a8c8;
			--sort-bg: #252b3d;
			--sort-border: #3a4060;
			--sort-color: #c8cce0;
		}

		html {
			min-height: 100%;
			background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
			background-attachment: fixed;
		}

		html.dark-mode {
			background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
			background-attachment: fixed;
		}

		body {
			font-family: var(--font-body);
			color: var(--text-main);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			padding-bottom: 100px;
			transition: color 0.3s;
			background: transparent;
		}

		/* ===== ヘッダー ===== */
		.site-header {
			width: 100%;
			background: var(--color-green);
			display: flex;
			align-items: center;
			padding: 24px 40px;
			box-shadow: var(--shadow-sm);
		}

		.rank-badge {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			padding: 8px 16px;
			background: linear-gradient(to bottom, #444 0%, #222 100%);
			border-radius: 30px;
			border: 2px solid #ffea9f;
			outline: 1.5px solid #a3751a;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3), inset 0 2px 3px rgba(255, 255, 255, 0.2);
		}

		.rank-label {
			font-size: 11px;
			font-weight: 900;
			color: #ffea9f;
			background: rgba(163, 117, 26, 0.4);
			padding: 2px 6px;
			border-radius: 10px;
			letter-spacing: 0.5px;
		}

		.rank-name {
			font-size: clamp(14px, 1.8vw, 18px);
			font-weight: 800;
			color: #fff;
			white-space: nowrap;
			text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
		}

		.user-name-badge {
			background: rgba(0, 0, 0, 0.6);
			backdrop-filter: blur(4px);
			padding: 6px 16px;
			border-radius: 20px;
			border: 2px solid rgba(255, 234, 159, 0.5);
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
		}

		.user-name-text {
			font-size: clamp(13px, 1.6vw, 16px);
			font-weight: 800;
			color: #fff;
			white-space: nowrap;
			text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
		}

		.user-avatar-container {
			position: relative;
		}

		.user-window-frame {
			width: clamp(46px, 5.5vw, 56px);
			height: clamp(46px, 5.5vw, 56px);
			background: radial-gradient(circle, #1a3a5f 0%, #0b1d33 100%);
			border: 3px solid #ffea9f;
			outline: 1.5px solid #a3751a;
			border-radius: 50%;
			display: flex;
			justify-content: center;
			align-items: center;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4), inset 0 2px 6px rgba(0, 0, 0, 0.6);
			cursor: pointer;
			transition: transform 0.2s;
		}

		.user-window-frame:hover {
			transform: scale(1.05);
		}

		.avatar-icon {
			width: 80%;
			height: 80%;
			color: #4fc3f7;
			filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
			transition: transform 0.2s, color 0.2s;
		}

		.user-window-frame:hover .avatar-icon {
			transform: rotate(10deg);
			color: #81d4fa;
		}

		.setting-balloon {
			position: absolute;
			top: 100%;
			right: 0;
			margin-top: 16px;
			width: 200px;
			background: linear-gradient(to bottom, #333 0%, #1a1a1a 100%);
			border: 2px solid #ffea9f;
			outline: 1.5px solid #a3751a;
			border-radius: 14px;
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
			padding: 12px 0;
			z-index: 2000;
			opacity: 0;
			visibility: hidden;
			transform: translateY(10px);
			transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
		}

		.setting-balloon.active {
			opacity: 1;
			visibility: visible;
			transform: translateY(0);
		}

		.balloon-arrow {
			position: absolute;
			top: -8px;
			right: 18px;
			width: 0;
			height: 0;
			border-left: 8px solid transparent;
			border-right: 8px solid transparent;
			border-bottom: 8px solid #ffea9f;
		}

		.balloon-arrow::after {
			content: '';
			position: absolute;
			top: 2px;
			left: -7px;
			border-left: 7px solid transparent;
			border-right: 7px solid transparent;
			border-bottom: 7px solid #333;
		}

		.balloon-title {
			font-size: 11px;
			font-weight: 800;
			color: #a3751a;
			padding: 0 16px 6px 16px;
			border-bottom: 1px solid rgba(255, 234, 159, 0.2);
			margin-bottom: 6px;
			letter-spacing: 0.5px;
		}

		.balloon-menu {
			list-style: none;
			padding: 0;
			margin: 0;
		}

		.balloon-menu li a {
			display: block;
			padding: 8px 16px;
			color: #fff;
			font-size: 14px;
			font-weight: 700;
			text-decoration: none;
			transition: background 0.15s, color 0.15s;
		}

		.balloon-menu li a:hover {
			background: #ffea9f;
			color: #222;
		}

		.menu-divider {
			height: 1px;
			background: rgba(255, 234, 159, 0.15);
			margin: 6px 0;
		}

		.balloon-menu li a.menu-logout {
			color: #ff4a4a;
		}

		.balloon-menu li a.menu-logout:hover {
			background: #ff4a4a;
			color: #fff;
		}

		/* ===== メインエリア ===== */
		.collection-main {
			width: 100%;
			max-width: 800px;
			margin: 0 auto;
			padding: 40px 20px 20px;
			box-sizing: border-box;
		}

		.collection-title {
			font-family: var(--font-display);
			font-size: clamp(32px, 5vw, 46px);
			font-weight: 900;
			text-align: center;
			color: #fff;
			letter-spacing: 2px;
			margin-bottom: 35px;
			text-shadow:
				-2px -2px 0 var(--color-blue), 2px -2px 0 var(--color-blue),
				-2px 2px 0 var(--color-blue), 2px 2px 0 var(--color-blue),
				0px 6px 0px #1a56b3, 0px 10px 15px rgba(0, 0, 0, 0.2);
			animation: fadeUp 0.5s ease both;
		}

		/* ===== 並び替え ===== */
		.sort-section {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: flex-end;
			gap: 8px;
			margin-bottom: 28px;
			animation: fadeUp 0.5s ease 0.1s both;
		}

		.sort-btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 7px 14px;
			border-radius: 20px;
			border: 1.5px solid var(--sort-border);
			background: var(--sort-bg);
			color: var(--sort-color);
			font-family: var(--font-body);
			font-size: 13px;
			font-weight: 800;
			cursor: pointer;
			box-shadow: var(--shadow-sm);
			transition: background 0.15s, color 0.15s, border-color 0.15s;
			white-space: nowrap;
		}

		.sort-btn:hover {
			border-color: var(--color-blue);
			color: var(--color-blue);
		}

		.sort-btn.active {
			background: var(--color-blue);
			color: #ffffff;
			border-color: var(--color-blue);
		}

		.sort-dir-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 36px;
			height: 36px;
			border-radius: 50%;
			border: 1.5px solid var(--sort-border);
			background: var(--sort-bg);
			color: var(--sort-color);
			font-size: 15px;
			cursor: pointer;
			box-shadow: var(--shadow-sm);
			transition: background 0.15s, color 0.15s, transform 0.2s;
		}

		.sort-dir-btn:hover {
			border-color: var(--color-blue);
			color: var(--color-blue);
		}

		.sort-dir-btn.desc {
			transform: rotate(180deg);
		}

		/* ===== カードリスト ===== */
		.collection-list {
			display: flex;
			flex-direction: column;
			gap: 24px;
		}

		.collection-item-card {
			position: relative;
			background: var(--card-bg);
			border-radius: var(--radius-card);
			padding: 22px 28px;
			border: 3px solid var(--card-border);
			outline: 2px solid var(--card-outline);
			box-shadow:
				0 6px 0px var(--card-shadow),
				0 12px 18px rgba(0, 0, 0, 0.15),
				inset 0 4px 4px var(--card-inner);
			display: flex;
			align-items: center;
			justify-content: space-between;
			min-height: 110px;
			transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
			animation: fadeUp 0.5s ease 0.2s both;
		}

		.collection-item-card.unlocked:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 0px var(--card-shadow), 0 16px 24px rgba(0, 0, 0, 0.18);
		}

		.item-main-info {
			flex: 1;
			display: flex;
			flex-direction: column;
			gap: 12px;
			padding-right: 16px;
		}

		.item-header {
			display: flex;
			align-items: center;
			flex-wrap: wrap;
			gap: 12px;
		}

		.item-number {
			font-family: var(--font-display);
			font-weight: 900;
			color: #a3751a;
			font-size: 18px;
			text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.3);
		}

		.item-word {
			font-size: clamp(18px, 3.5vw, 24px);
			font-weight: 800;
			color: var(--text-main);
			margin-top: 4px;
		}

		.item-actions {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 140px;
			height: 46px;
		}

		.item-likes {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			background: var(--badge-bg);
			padding: 4px 12px;
			border-radius: 20px;
			font-size: 14px;
			font-weight: 800;
			color: var(--text-sub);
			border: 1px solid var(--badge-border);
		}

		.like-icon {
			color: var(--color-blue);
		}

		.medal-icon {
			color: var(--color-orange);
		}

		/* ===== いいねボタン ===== */
		.like-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			background: var(--like-btn-bg);
			border: 2px solid var(--like-btn-border);
			border-radius: 50px;
			width: 100%;
			height: 100%;
			cursor: pointer;
			font-family: var(--font-body);
			font-size: 14px;
			font-weight: 800;
			color: var(--like-btn-color);
			box-shadow: 0 3px 0px var(--like-btn-shadow), 0 4px 6px rgba(0, 0, 0, 0.05);
			transition: background 0.15s, border-color 0.15s, color 0.15s;
		}

		.like-btn:hover {
			border-color: var(--color-blue);
			color: var(--color-blue);
			background: #f0f4f8;
			box-shadow: 0 3px 0px #2a6ed1, 0 4px 6px rgba(66, 133, 244, 0.1);
		}

		.like-btn.liked {
			background: linear-gradient(to bottom, #4285f4 0%, #2a6ed1 100%);
			border-color: #4285f4;
			color: #ffffff;
			box-shadow: 0 3px 0px #1d4fa0, 0 4px 6px rgba(42, 110, 209, 0.2);
		}

		.like-btn.liked:hover {
			background: linear-gradient(to bottom, #5492f5 0%, #357ae8 100%);
			border-color: #5492f5;
			color: #ffffff;
			box-shadow: 0 3px 0px #1d4fa0, 0 4px 6px rgba(42, 110, 209, 0.3);
		}

		.like-btn:active {
			transform: translateY(3px);
			box-shadow: 0 0px 0px transparent !important;
		}

		/* ===== 固定「メニューに戻る」ボタン（バーなし・浮かせるだけ） ===== */
		.fixed-footer-bar {
			position: fixed;
			bottom: 80px;
			/* 56px(フッター) + 24px(余白) */
			left: 24px;
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 1000;
			background: none;
			border: none;
			pointer-events: none;
		}

		.back-btn {
			pointer-events: auto;
			display: inline-flex;
			align-items: center;
			gap: 10px;
			color: var(--color-blue);
			text-decoration: none;
			font-weight: 800;
			font-size: 17px;
			background: var(--card-bg);
			padding: 11px 32px;
			border-radius: 30px;
			border: 2px solid var(--badge-border);
			box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
			transition: all 0.2s ease;
		}

		.back-btn:hover {
			color: #fff;
			background: var(--color-blue);
			border-color: var(--color-blue);
			transform: translateY(-2px);
		}

		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(20px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>

<body>
	<header th:replace="~{fragments/header :: header}"></header>

	<main class="collection-main">
		<h2 class="collection-title">WORD COLLECTION</h2>

		<div class="sort-section">
			<button class="sort-btn active" data-sort="id">
				<i class="fa-solid fa-hashtag"></i> 番号順
			</button>
			<button class="sort-btn" data-sort="kana">
				<i class="fa-solid fa-a"></i> あいうえお
			</button>
			<button class="sort-btn" data-sort="likes">
				<i class="fa-solid fa-thumbs-up"></i> いいね順
			</button>
			<button class="sort-btn" data-sort="date">
				<i class="fa-regular fa-calendar"></i> 取得日順
			</button>
			<button class="sort-dir-btn" id="sortDirBtn" title="昇順">
				<i class="fa-solid fa-arrow-up"></i>
			</button>
		</div>

		<div class="collection-list" id="collectionList">
			<p th:if="${#lists.isEmpty(collection)}" style="text-align:center; color:#fff; font-weight:800;">
				まだコレクションがありません。クイズに正解して集めよう！
			</p>

			<div class="collection-item-card unlocked" th:each="item : ${collection}" th:if="${item.deletedAt == null}"
				th:data-id="${item.collectionId}" th:data-likes="${item.likeCount != null ? item.likeCount : 0}"
				th:data-date="${item.createdAt != null ? #temporals.format(item.createdAt, 'yyyy/MM/dd') : '0000/00/00'}"
				th:data-kana="${item.quote}">

				<div class="item-main-info">
					<div class="item-header">
						<span class="item-number" th:text="${#numbers.formatInteger(item.collectionId, 3)}">001</span>

						<span class="item-likes" th:if="${item.hasGoldMedal}">
							<i class="fa-solid fa-medal medal-icon"></i>
							<span>金メダル</span>
						</span>

						<span class="item-likes" th:if="${item.createdAt != null}">
							<i class="fa-regular fa-calendar like-icon"></i>
							<span th:text="${#temporals.format(item.createdAt, 'yyyy/MM/dd')}">2026/01/01</span>
						</span>

						<span class="item-likes">
							<i class="fa-solid fa-thumbs-up like-icon"></i>
							<span th:id="'like-count-' + ${item.collectionId}"
								th:text="${item.likeCount != null ? item.likeCount : 0}">0</span>
						</span>
					</div>
					<h3 class="item-word" th:text="${item.quote}">継続は力なり</h3>
				</div>

				<div class="item-actions">
					<button class="like-btn" th:classappend="${item.isLiked} ? 'liked' : ''"
						th:data-id="${item.collectionId}" th:data-quote-id="${item.quoteId}">
						<span class="like-btn-text" th:text="${item.isLiked} ? '👍 いいね済み' : '👍 いいね'">👍 いいね</span>
					</button>
				</div>
			</div>
		</div>
	</main>

	<div class="fixed-footer-bar">
		<a th:href="@{/}" class="back-btn">
			<i class="fa-solid fa-arrow-left"></i> メニューに戻る
		</a>
	</div>

	<footer th:replace="~{fragments/footer :: footer}" style="display:none;"></footer>

	<script>
		(function () {
			const savedDark = localStorage.getItem('quiz_dark_mode');
			if (savedDark === 'true') {
				document.documentElement.classList.add('dark-mode');
			}
		})();
		document.addEventListener('DOMContentLoaded', () => {

			const trigger = document.getElementById('avatarTrigger');
			const balloon = document.getElementById('settingBalloon');
			if (trigger && balloon) {
				trigger.addEventListener('click', e => {
					e.stopPropagation();
					balloon.classList.toggle('active');
				});
				document.addEventListener('click', e => {
					if (!balloon.contains(e.target) && e.target !== trigger) {
						balloon.classList.remove('active');
					}
				});
			}

			// ===== 並び替え =====
			const list = document.getElementById('collectionList');
			const sortBtns = document.querySelectorAll('.sort-btn');
			const dirBtn = document.getElementById('sortDirBtn');
			let currentSort = 'id';
			let ascending = true;

			function getCards() {
				return Array.from(list.querySelectorAll('.collection-item-card'));
			}

			function sortCards() {
				const cards = getCards();
				cards.sort((a, b) => {
					switch (currentSort) {
						case 'id':
							return ascending
								? (parseInt(a.dataset.id) || 0) - (parseInt(b.dataset.id) || 0)
								: (parseInt(b.dataset.id) || 0) - (parseInt(a.dataset.id) || 0);
						case 'likes':
							return ascending
								? (parseInt(a.dataset.likes) || 0) - (parseInt(b.dataset.likes) || 0)
								: (parseInt(b.dataset.likes) || 0) - (parseInt(a.dataset.likes) || 0);
						case 'date':
							return ascending
								? (a.dataset.date || '').localeCompare(b.dataset.date || '')
								: (b.dataset.date || '').localeCompare(a.dataset.date || '');
						case 'kana':
							return ascending
								? (a.dataset.kana || '').localeCompare(b.dataset.kana || '', 'ja')
								: (b.dataset.kana || '').localeCompare(a.dataset.kana || '', 'ja');
						default:
							return 0;
					}
				});
				cards.forEach(card => list.appendChild(card));
			}

			sortBtns.forEach(btn => {
				btn.addEventListener('click', () => {
					sortBtns.forEach(b => b.classList.remove('active'));
					btn.classList.add('active');
					currentSort = btn.dataset.sort;
					sortCards();
				});
			});

			dirBtn.addEventListener('click', () => {
				ascending = !ascending;
				dirBtn.classList.toggle('desc', !ascending);
				dirBtn.title = ascending ? '昇順' : '降順';
				sortCards();
			});

			// ===== いいねボタン =====
			document.querySelectorAll('.like-btn').forEach(button => {
				button.addEventListener('click', async function (e) {
					e.preventDefault();
					const collectionId = this.getAttribute('data-id');
					const quoteId = this.getAttribute('data-quote-id');
					if (!collectionId || !quoteId) return;
					this.disabled = true;
					try {
						const response = await fetch('/like', {
							method: 'POST',
							headers: {'Content-Type': 'application/json'},
							body: JSON.stringify({
								collectionId: parseInt(collectionId),
								quoteId: parseInt(quoteId)
							})
						});
						if (response.ok) {
							const updatedCount = await response.json();
							const countTarget = document.getElementById(`like-count-${collectionId}`);
							if (countTarget) countTarget.textContent = updatedCount;

							const card = this.closest('.collection-item-card');
							if (card) card.dataset.likes = updatedCount;

							const textTarget = this.querySelector('.like-btn-text');
							if (this.classList.contains('liked')) {
								this.classList.remove('liked');
								if (textTarget) textTarget.textContent = '👍 いいね';
							} else {
								this.classList.add('liked');
								if (textTarget) textTarget.textContent = '👍 いいね済み';
							}
						} else {
							console.error('サーバーエラーが発生しました');
						}
					} catch (error) {
						console.error('通信に失敗しました', error);
					} finally {
						this.disabled = false;
					}
				});
			});
		});
	</script>
</body>

</html>
